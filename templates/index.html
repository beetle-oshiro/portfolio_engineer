<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>エンジニア求人向けポートフォリオ</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/home.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="home-page">
    <div id="loading-screen">
      <canvas id="loadingCanvas"></canvas>
    </div>
    <h1 class="site-title">エンジニア求人向け自己紹介サイト</h1>

    <main class="home-layout">
      <!-- 左：通常メニュー -->
      <div class="side-menu">
        <a href="/profile" class="side-button profile-button">
          <img
            src="{{ url_for('static', filename='images/profile_ship.png') }}"
            class="side-button-img"
          />
          <span>プロフィール</span>
        </a>

        <a href="/works" class="side-button works-button">
          <img
            src="{{ url_for('static', filename='images/works_ship.png') }}"
            class="side-button-img"
          />
          <span>制作物</span>
        </a>
      </div>

      <!-- 中央：奇妙ゾーン（隠れAI） -->
      <section class="mystery-panel">
        <div class="mystery-core">
          <div class="mystery-ring"></div>

          <p class="mystery-text">{{ mystery_text }}</p>
        </div>
      </section>

      <!-- 右側：AI操作エリア -->
      <section class="assistant-panel">
        <h2>AI ASSISTANT</h2>

        <p class="ai-lead">大城将吾について質問できます。</p>

        <form action="/ai_question" method="post" class="ai-form">
          <input
            type="text"
            name="question"
            placeholder="例：どんなスキルがありますか？ / 強みは何ですか？"
          />
          <button type="submit">質問する</button>
        </form>

        {% if result %}
        <div class="ai-result">
          <h3>AI RESPONSE</h3>
          <p>{{ result }}</p>
        </div>
        {% endif %}

        <div class="ai-divider">OR</div>

        <p class="ai-lead">見たいページを自然な言葉で入力してください。</p>

        <form action="/ai_suggest" method="post" class="ai-form">
          <select name="mode">
            <option value="works">制作物</option>
            <option value="profile">プロフィール</option>
          </select>

          <input
            type="text"
            name="keyword"
            placeholder="例：プロフィールを見たい / Pythonの作品を見たい"
          />

          <button type="submit">案内する</button>
        </form>

        <!-- ここから追加👇 -->
        {% if suggestions %}
        <div class="ai-suggestions">
          <h3>AI提案</h3>

          {% for s in suggestions %}
          <div class="suggest-card">
            <h4>{{ s.title }}</h4>
            <p>{{ s.desc }}</p>
            <a href="{{ s.url }}" class="suggest-btn">移動</a>
          </div>
          {% endfor %}
        </div>
        {% endif %}
        <!-- ここまで追加👆 -->
      </section>

      <!-- 右：AIキャラクター -->
      <!-- <div class="droid-area">
        <div class="electric-circle"></div>

        <img
          src="{{ url_for('static', filename='images/droid_face.png') }}"
          alt="AIアシスタント"
          class="droid-face"
        />

        <p class="droid-status">SYSTEM READY</p>
      </div> -->
    </main>
    <script>
      const canvas = document.getElementById("loadingCanvas");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let stars = [];

      for (let i = 0; i < 400; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          z: Math.random() * canvas.width,
        });
      }

      function draw() {
        ctx.fillStyle = "#020617";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let star of stars) {
          star.z -= 20;

          if (star.z <= 0) {
            star.z = canvas.width;
          }

          let x =
            (star.x - canvas.width / 2) * (canvas.width / star.z) +
            canvas.width / 2;
          let y =
            (star.y - canvas.height / 2) * (canvas.width / star.z) +
            canvas.height / 2;

          let size = (1 - star.z / canvas.width) * 6;

          ctx.fillStyle = "#38bdf8";
          ctx.shadowBlur = 8;
          ctx.shadowColor = "#38bdf8";

          ctx.fillRect(x, y, size, size); // 中心座標
          let centerX = canvas.width / 2;
          let centerY = canvas.height / 2;

          // ベクトル計算
          let dx = x - centerX;
          let dy = y - centerY;

          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist === 0) dist = 1;

          dx /= dist;
          dy /= dist;

          // 線 or 点
          if (Math.random() < 0.5) {
            let length = Math.random() * 30 + 10;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - dx * length, y - dy * length);
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 2;
            ctx.stroke();
          } else {
            ctx.fillRect(x, y, size, size);
          }
        }

        requestAnimationFrame(draw);
      }

      draw();

      window.addEventListener("load", () => {
        setTimeout(() => {
          document.getElementById("loading-screen").style.display = "none";
        }, 500);
      });
    </script>
  </body>
</html>
