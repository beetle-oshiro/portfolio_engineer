<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>エンジニア求人向けポートフォリオ</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/home.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="home-page">
    <h1 class="site-title">エンジニア求人向け自己紹介サイト</h1>

    <main class="home-layout">
      <!-- 左：通常メニュー -->
      <div class="side-menu">
        <a href="/profile" class="side-button profile-button">
          <img
            src="{{ url_for('static', filename='images/profile_ship.png') }}"
            class="side-button-img"
          />
          <span>プロフィール</span>
        </a>

        <a href="/works" class="side-button works-button">
          <img
            src="{{ url_for('static', filename='images/works_ship.png') }}"
            class="side-button-img"
          />
          <span>制作物</span>
        </a>
      </div>

      <!-- 中央：奇妙ゾーン（隠れAI） -->
      <section class="mystery-panel">
        <div class="mystery-core">
          <div class="mystery-ring"></div>

          <p class="mystery-text">{{ mystery_text }}</p>
        </div>
      </section>

      <!-- 右側：AI操作エリア -->
      <section class="assistant-panel">
        <h2>AI ASSISTANT</h2>

        <p class="ai-lead">大城将吾について質問できます。</p>

        <form action="/ai_question" method="post" class="ai-form">
          <input
            type="text"
            name="question"
            placeholder="例：どんなスキルがありますか？ / 強みは何ですか？"
          />
          <button type="submit">質問する</button>
        </form>

        {% if result %}
        <div class="ai-result">
          <h3>AI RESPONSE</h3>
          <p>{{ result }}</p>
        </div>
        {% endif %}

        <div class="ai-divider">OR</div>

        <p class="ai-lead">見たいページを自然な言葉で入力してください。</p>

        <form action="/ai_suggest" method="post" class="ai-form">
          <select name="mode">
            <option value="works">制作物</option>
            <option value="profile">プロフィール</option>
          </select>

          <input
            type="text"
            name="keyword"
            placeholder="例：プロフィールを見たい / Pythonの作品を見たい"
          />

          <button type="submit">案内する</button>
        </form>

        <!-- ここから追加👇 -->
        {% if suggestions %}
        <div class="ai-suggestions">
          <h3>AI提案</h3>

          {% for s in suggestions %}
          <div class="suggest-card">
            <h4>{{ s.title }}</h4>
            <p>{{ s.desc }}</p>
            <a href="{{ s.url }}" class="suggest-btn">移動</a>
          </div>
          {% endfor %}
        </div>
        {% endif %}
        <!-- ここまで追加👆 -->
      </section>

      <!-- 右：AIキャラクター -->
      <!-- <div class="droid-area">
        <div class="electric-circle"></div>

        <img
          src="{{ url_for('static', filename='images/droid_face.png') }}"
          alt="AIアシスタント"
          class="droid-face"
        />

        <p class="droid-status">SYSTEM READY</p>
      </div> -->
    </main>
  </body>
</html>
